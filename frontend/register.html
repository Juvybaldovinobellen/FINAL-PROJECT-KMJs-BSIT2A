<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Student Information</h2>

<form action="#" method="POST">
    <input type="text" name="fullName" placeholder="Full Name" required>
    <input type="text" name="studentNumber" placeholder="Student Number" required>
    <input type="text" name="course" placeholder="Course" required>
    <input type="text" name="yearBlock" placeholder="Year & Block" required>
    <input type="text" name="contact" placeholder="Contact Number" required>
    <input type="email" name="personalEmail" placeholder="Personal Email" required>
    <textarea name="address" placeholder="Address"></textarea>

    <h3>Account Info</h3>
    <input type="email" name="accountEmail" placeholder="Email" required>
    <input type="password" name="accountPassword" placeholder="Password" required>

    <button type="submit">Register</button>
</form>

<script src="js/script.js"></script>
</body>
</html>
